name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.css'
      - 'docs/**'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  push:
    branches:
      - master
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.css'
      - 'docs/**'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      validate: ${{ steps.filter.outputs.validate }}
      e2e: ${{ steps.filter.outputs.e2e }}
      app: ${{ steps.filter.outputs.app }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            validate:
              - 'questions.js'
              - 'questions_extra1.js'
              - 'questions_extra2.js'
              - 'questions_extra3.js'
              - 'explanations.js'
              - 'explanations_extra.js'
              - 'scripts/validate-questions.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            e2e:
              - 'index.html'
              - 'app.js'
              - 'style.css'
              - 'questions.js'
              - 'questions_extra1.js'
              - 'questions_extra2.js'
              - 'questions_extra3.js'
              - 'explanations.js'
              - 'explanations_extra.js'
              - 'tests/**'
              - 'playwright.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            app:
              - '**/*.html'
              - '**/*.js'
              - '**/*.css'
              - '!playwright.config.js'
              - '!docs/**'
              - '!tests/**'
              - '!scripts/**'
              - '!.github/workflows/**'
            docs:
              - 'docs/**'
              - 'README.md'

  validate:
    name: Validate questions data
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.validate == 'true'
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate questions and explanations
        run: npm run validate

  e2e:
    name: Run Playwright E2E
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.e2e == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  docs-check:
    name: Verify docs updates
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.app == 'true'
    timeout-minutes: 5
    steps:
      - name: Check documentation updates
        run: |
          if [ "${{ needs.changes.outputs.docs }}" != "true" ]; then
            echo "::error::Application code was modified, but no updates were found in docs/ or README.md. Please keep documentation in sync with code changes."
            exit 1
          fi
          echo "Documentation check passed."
