# 旧: GitHub 公式 actions/deploy-pages でサイト全体を置き換える手動デプロイ（レガシー）
# 本番・STG の自動デプロイは deploy-cloudflare-pages.yml（Cloudflare Pages）を正とする。
name: Deploy GitHub Pages (legacy / manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
