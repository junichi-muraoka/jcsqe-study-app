name: Docs Update Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

permissions:
  contents: read

jobs:
  check-docs-updated:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to check diffs

      - name: Check for modified app files
        id: check_app_files
        run: |
          # Check if application html/css/js files changed, excluding docs/tests/scripts helpers
          if git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | grep -E '\.(html|js|css)$' | grep -Ev '^(docs/|tests/|scripts/)'; then
            echo "app_modified=true" >> $GITHUB_OUTPUT
          else
            echo "app_modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for modified docs
        id: check_doc_files
        run: |
          # Check if anything inside the docs/ folder has been modified or README.md
          if git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | grep -E '^(docs/|README\.md$)'; then
            echo "docs_modified=true" >> $GITHUB_OUTPUT
          else
            echo "docs_modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify Docs were updated if App was updated
        run: |
          if [ "${{ steps.check_app_files.outputs.app_modified }}" == "true" ] && [ "${{ steps.check_doc_files.outputs.docs_modified }}" == "false" ]; then
            echo "::error::Application code was modified, but no updates were found in the docs/ directory or README.md. Please ensure that documentation is kept up-to-date with code changes."
            echo "💡 Tip: You can ask the AI agent to run the '/update_docs' workflow to automatically analyze the changes and propose documentation updates."
            exit 1
          fi
          echo "Documentation check passed."
