name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
    paths:
      - 'index.html'
      - 'app.js'
      - 'style.css'
      - 'questions.js'
      - 'questions_extra1.js'
      - 'questions_extra2.js'
      - 'questions_extra3.js'
      - 'explanations.js'
      - 'explanations_extra.js'
      - 'tests/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  push:
    branches:
      - master
    paths:
      - 'index.html'
      - 'app.js'
      - 'style.css'
      - 'questions.js'
      - 'questions_extra1.js'
      - 'questions_extra2.js'
      - 'questions_extra3.js'
      - 'explanations.js'
      - 'explanations_extra.js'
      - 'tests/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7
