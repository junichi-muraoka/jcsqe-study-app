name: Validate Questions Data

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
    paths:
      - 'questions.js'
      - 'questions_extra1.js'
      - 'questions_extra2.js'
      - 'questions_extra3.js'
      - 'explanations.js'
      - 'explanations_extra.js'
      - 'scripts/validate-questions.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate_questions.yml'
  push:
    branches:
      - master
    paths:
      - 'questions.js'
      - 'questions_extra1.js'
      - 'questions_extra2.js'
      - 'questions_extra3.js'
      - 'explanations.js'
      - 'explanations_extra.js'
      - 'scripts/validate-questions.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate_questions.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate questions and explanations
        run: npm run validate
