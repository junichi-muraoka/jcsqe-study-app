<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JCSQE初級 ソフトウェア品質技術者試験 合格対策学習アプリ - SQuBOK Guide第3版準拠">
  <title>JCSQE初級 合格対策アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ホーム画面 -->
    <div id="home" class="screen active">
      <div class="header">
        <h1>JCSQE初級 合格対策</h1>
        <p>SQuBOK Guide 第3版準拠 ｜ 全127問収録</p>
      </div>
      <div id="home-stats" class="card hidden">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value" id="home-total">0</div><div class="stat-label">総回答数</div></div>
          <div class="stat-card"><div class="stat-value" id="home-rate">--%</div><div class="stat-label">正答率</div></div>
          <div class="stat-card"><div class="stat-value" id="home-weak">0</div><div class="stat-label">弱点問題</div></div>
        </div>
      </div>
      <div class="nav-grid">
        <div class="nav-card" onclick="showScreen('chapter-select')">
          <span class="icon">📚</span>
          <span class="label">分野別学習</span>
          <span class="desc">章ごとに問題を解く</span>
        </div>
        <div class="nav-card" onclick="startWeakMode()">
          <span class="icon">🔄</span>
          <span class="label">弱点克服</span>
          <span class="desc">間違えた問題を復習</span>
        </div>
        <div class="nav-card" onclick="startMockExam()">
          <span class="icon">🎯</span>
          <span class="label">模擬試験</span>
          <span class="desc">40問 × 60分</span>
        </div>
        <div class="nav-card" onclick="showDashboard()">
          <span class="icon">📊</span>
          <span class="label">成績</span>
          <span class="desc">進捗と分析を確認</span>
        </div>
      </div>
    </div>

    <!-- 章選択画面 -->
    <div id="chapter-select" class="screen">
      <button class="btn btn-secondary btn-sm" onclick="showScreen('home')" style="margin-bottom:20px;">← ホーム</button>
      <div class="card">
        <h2 style="margin-bottom:20px;">📚 分野別学習</h2>
        <div class="chapter-list" id="chapter-list"></div>
      </div>
    </div>

    <!-- クイズ画面 -->
    <div id="quiz" class="screen">
      <div class="card">
        <div class="quiz-header">
          <span class="quiz-progress" id="quiz-progress">1 / 10</span>
          <span class="quiz-level" id="quiz-level">L1</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="quiz-bar" style="width:0%"></div></div>
        <div id="quiz-timer-box" class="hidden" style="text-align:right;margin-bottom:12px;">
          <span class="timer" id="quiz-timer">60:00</span>
        </div>
        <p class="quiz-question" id="quiz-question"></p>
        <div class="choices" id="quiz-choices"></div>
        <div class="explanation hidden" id="quiz-explanation">
          <h4>💡 解説</h4>
          <div id="quiz-explanation-text"></div>
        </div>
        <div class="mt-20 hidden" id="quiz-next-box" style="text-align:right;">
          <button class="btn btn-primary btn-sm" id="quiz-next-btn" onclick="nextQuestion()">次の問題 →</button>
        </div>
      </div>
    </div>

    <!-- 結果画面 -->
    <div id="result" class="screen">
      <div class="card result-card">
        <h2 style="margin-bottom:20px;">📝 結果</h2>
        <div class="result-score" id="result-score">80%</div>
        <div class="result-label" id="result-detail">32 / 40 正解</div>
        <div class="result-pass" id="result-pass">合格ライン達成！</div>
        <div class="mt-20" id="result-chapter-stats"></div>
        <div class="mt-20 flex-row" style="justify-content:center;">
          <button class="btn btn-secondary" onclick="showScreen('home')">ホームに戻る</button>
          <button class="btn btn-primary" id="result-retry-btn" onclick="retryQuiz()">もう一度挑戦</button>
        </div>
      </div>
    </div>

    <!-- ダッシュボード画面 -->
    <div id="dashboard" class="screen">
      <button class="btn btn-secondary btn-sm" onclick="showScreen('home')" style="margin-bottom:20px;">← ホーム</button>
      <div class="card">
        <h2 style="margin-bottom:20px;">📊 学習ダッシュボード</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value" id="dash-total">0</div><div class="stat-label">総回答数</div></div>
          <div class="stat-card"><div class="stat-value" id="dash-correct">0</div><div class="stat-label">正解数</div></div>
          <div class="stat-card"><div class="stat-value" id="dash-rate">--%</div><div class="stat-label">正答率</div></div>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:16px;">章別正答率</h3>
        <div class="chapter-stats" id="dash-chapters"></div>
      </div>
      <div class="card" id="dash-weak-card">
        <h3 style="margin-bottom:12px;">🔄 弱点問題 (<span id="dash-weak-count">0</span>問)</h3>
        <div id="dash-weak-list" style="font-size:0.85rem;color:var(--text-secondary);"></div>
      </div>
      <div class="card text-center">
        <button class="btn btn-secondary btn-sm" onclick="resetData()">🗑️ データをリセット</button>
      </div>
    </div>

  </div>

  <script src="questions.js"></script>
  <script src="questions_extra1.js"></script>
  <script src="questions_extra2.js"></script>
  <script src="questions_extra3.js"></script>
  <script src="explanations.js"></script>
  <script src="app.js"></script>
</body>
</html>
